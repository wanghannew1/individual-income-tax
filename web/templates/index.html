<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个税累计预扣计算器</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>个税累计预扣计算器</h1>
            <p class="subtitle">根据中国个人所得税累计预扣法，计算工资薪金所得每月预扣税额</p>
        </header>

        <form action="/calculate" method="post" id="taxForm">
            <div class="controls">
                <label for="months">月份数：
                    <select name="months" id="months">
                        {% for m in range(1, 13) %}
                        <option value="{{ m }}" {% if m == 12 %}selected{% endif %}>{{ m }}个月</option>
                        {% endfor %}
                    </select>
                </label>
                <label class="comparison-toggle">
                    <input type="checkbox" name="comparison" value="true">
                    对比旧方法（按月计算）
                </label>
            </div>

            <div class="table-wrapper">
                <table id="salaryTable">
                    <thead>
                        <tr>
                            <th style="min-width:50px">月份</th>
                            <th style="min-width:120px">工资收入</th>
                            <th style="min-width:100px">三险一金</th>
                            <th style="min-width:100px">其他扣除</th>
                            {% for key in deduction_keys %}
                            <th style="min-width:100px">{{ special_deductions[key]["label"] }}</th>
                            {% endfor %}
                        </tr>
                    </thead>
                    <tbody>
                        {% for m in range(1, months + 1) %}
                        <tr>
                            <td class="month-cell">{{ m }}月</td>
                            <td><input type="number" name="m{{ m }}_salary" min="0" step="100" value="0" required></td>
                            <td><input type="number" name="m{{ m }}_social" min="0" step="100" value="0"></td>
                            <td><input type="number" name="m{{ m }}_other" min="0" step="100" value="0"></td>
                            {% for key in deduction_keys %}
                            <td><input type="number" name="m{{ m }}_{{ key }}" min="0" step="100" value="0"
                                {% if key == "serious_illness" and m != 12 %}disabled class="disabled-input"{% endif %}></td>
                            {% endfor %}
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>

            <div class="actions">
                <button type="submit" class="btn btn-primary">计算</button>
                <button type="reset" class="btn btn-secondary">重置</button>
            </div>
        </form>
    </div>
    <script>
        document.getElementById('months').addEventListener('change', function() {
            document.getElementById('taxForm').submit();
        });
    </script>
</body>
</html>
